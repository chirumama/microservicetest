apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: backend
          image: BACKEND_IMAGE_PLACEHOLDER
          ports:
            - containerPort: 80
          env:
            - name: ASPNETCORE_URLS
              value: "http://0.0.0.0:80"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  type: NodePort   # 🔥 THIS WAS MISSING
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30081